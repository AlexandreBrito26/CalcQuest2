<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>CalcQuest 2 — A Saga dos Números</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@400;700;900&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0d10;--bg2:#111116;--bg3:#17171f;--bg4:#1e1e28;
  --bdr:#252535;--bdr2:#35355a;
  --red:#e53935;--red2:#ff6b6b;
  --green:#1db954;--green2:#57f58a;
  --blue:#1565c0;--blue2:#42a5f5;
  --purple:#7b1fa2;--purple2:#ce93d8;
  --teal:#00897b;--teal2:#4db6ac;
  --gold:#ffd600;--gold2:#fff176;
  --white:#eeeeff;--muted:#55557a;
  --caos:#ff1744;
  --arena-border:#c62828;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;}
body{font-family:'Rajdhani',sans-serif;color:var(--white);display:flex;align-items:center;justify-content:center;}
#app{width:430px;height:100vh;max-height:870px;display:flex;flex-direction:column;background:var(--bg);position:relative;overflow:hidden;border:1px solid var(--bdr);}
@media(max-width:450px){#app{width:100vw;border:none;max-height:100vh;}}
.screen{display:none;flex-direction:column;flex:1;overflow:hidden;}
.screen.active{display:flex;}

/* ── TITLE ── */
#scTitle{background:radial-gradient(ellipse at 50% 25%,#1c0535 0%,#0d0d10 60%);align-items:center;justify-content:center;position:relative;overflow:hidden;}
.tpart{position:absolute;border-radius:50%;animation:tpA var(--d) ease-in-out infinite;opacity:0;}
@keyframes tpA{0%{opacity:0;transform:translateY(0) scale(0)}20%{opacity:var(--o)}80%{opacity:var(--o)}100%{opacity:0;transform:translateY(-120px) scale(1.5)}}
.t-icon{font-size:4.5rem;filter:drop-shadow(0 0 24px rgba(255,214,0,.9));animation:tIco 3.5s ease-in-out infinite;}
@keyframes tIco{0%,100%{transform:translateY(0) rotate(-6deg)}50%{transform:translateY(-14px) rotate(6deg)}}
.t-logo{font-family:'Orbitron',monospace;font-weight:900;font-size:2.6rem;background:linear-gradient(135deg,#ffd600,#fff9c4,#ffd600);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 18px rgba(255,214,0,.5));letter-spacing:.06em;text-align:center;line-height:1;}
.t-num{font-family:'Orbitron',monospace;font-size:2.2rem;font-weight:900;color:var(--gold);line-height:1;filter:drop-shadow(0 0 18px rgba(255,214,0,.6));}
.t-sub{font-size:.72rem;letter-spacing:.55em;color:var(--purple2);text-transform:uppercase;margin-top:8px;text-align:center;}
.t-div{width:55%;height:1px;background:linear-gradient(90deg,transparent,var(--bdr2),transparent);margin:22px 0;}
.t-menu{display:flex;flex-direction:column;gap:10px;width:82%;}
.tmb{padding:14px 20px;border:none;border-radius:8px;cursor:pointer;font-family:'Orbitron',monospace;font-size:.72rem;font-weight:700;letter-spacing:.1em;position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s;display:flex;align-items:center;gap:12px;color:#fff;}
.tmb::before{content:'';position:absolute;inset:0;background:rgba(255,255,255,.07);opacity:0;transition:opacity .15s;}
.tmb:hover::before{opacity:1;}
.tmb:hover{transform:translateX(5px);}
.tmb:active{transform:scale(.97);}
.tmb.pri{background:linear-gradient(135deg,#b71c1c,#e53935);box-shadow:0 4px 22px rgba(229,57,53,.45);}
.tmb.acc{background:linear-gradient(135deg,#4a148c,#8e24aa);box-shadow:0 4px 18px rgba(142,36,170,.4);}
.tmb.sec{background:var(--bg3);border:1px solid var(--bdr2);color:rgba(240,240,255,.8);}
.t-ver{position:absolute;bottom:10px;font-size:.58rem;color:var(--muted);font-family:'Orbitron',monospace;letter-spacing:.25em;}

/* ── CLASS SELECT ── */
#scClass{background:var(--bg);}
.sh{display:flex;align-items:center;gap:10px;padding:13px 16px 11px;border-bottom:1px solid var(--bdr);background:var(--bg2);}
.sh-bk{background:var(--bg3);border:1px solid var(--bdr2);color:var(--white);padding:5px 11px;border-radius:5px;cursor:pointer;font-family:'Orbitron',monospace;font-size:.62rem;transition:all .15s;}
.sh-bk:hover{border-color:var(--red);color:var(--red);}
.sh-t{font-family:'Orbitron',monospace;font-size:.82rem;color:var(--gold);flex:1;}
.ccards{flex:1;overflow-y:auto;padding:14px;}
.cc{background:var(--bg3);border:1px solid var(--bdr2);border-radius:10px;padding:16px;display:flex;gap:14px;cursor:pointer;transition:all .22s;position:relative;overflow:hidden;margin-bottom:10px;}
.cc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--ca);border-radius:0 2px 2px 0;}
.cc:hover{background:var(--bg4);transform:translateX(5px);}
.cc:active{transform:scale(.98);}
.cc-em{font-size:2.8rem;align-self:center;}
.cc-info{flex:1;}
.cc-nm{font-family:'Orbitron',monospace;font-size:.88rem;font-weight:700;color:var(--gold);}
.cc-ds{font-size:.75rem;color:var(--muted);margin:3px 0 8px;font-family:'Crimson Pro',serif;font-style:italic;line-height:1.4;}
.cc-st{display:flex;gap:7px;flex-wrap:wrap;}
.cst{font-size:.65rem;padding:2px 8px;border-radius:4px;font-weight:700;}
.cst.hp{background:rgba(29,185,84,.18);color:var(--green2);border:1px solid rgba(29,185,84,.3);}
.cst.mp{background:rgba(92,107,192,.2);color:#90caf9;border:1px solid rgba(92,107,192,.35);}
.cst.atk{background:rgba(229,57,53,.18);color:var(--red2);border:1px solid rgba(229,57,53,.3);}
.cst.spd{background:rgba(255,214,0,.14);color:var(--gold2);border:1px solid rgba(255,214,0,.28);}

/* ── STORY ── */
#scStory{background:var(--bg);align-items:center;justify-content:center;padding:28px 22px;position:relative;overflow:hidden;cursor:pointer;}
.stl{position:absolute;height:1px;background:linear-gradient(90deg,transparent,rgba(80,60,180,.35),transparent);width:100%;animation:stlA var(--d,4s) ease-in-out infinite;}
@keyframes stlA{0%,100%{transform:translateY(0)}50%{transform:translateY(160px)}}
.s-badge{font-family:'Orbitron',monospace;font-size:.62rem;letter-spacing:.45em;color:var(--purple2);text-transform:uppercase;border:1px solid var(--purple);padding:4px 16px;border-radius:20px;margin-bottom:20px;opacity:0;animation:fadeUp .8s ease .5s forwards;}
.s-title{font-family:'Orbitron',monospace;font-size:1.5rem;font-weight:900;text-align:center;line-height:1.2;background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 22px rgba(255,214,0,.35));opacity:0;animation:fadeUp .8s ease 1s forwards;margin-bottom:18px;}
.s-body{font-family:'Crimson Pro',serif;font-size:1.02rem;line-height:2;color:rgba(238,238,255,.82);text-align:center;max-width:340px;white-space:pre-line;opacity:0;animation:fadeUp .8s ease 1.5s forwards;}
.s-tap{margin-top:18px;font-size:.72rem;color:var(--muted);letter-spacing:.35em;text-transform:uppercase;opacity:0;animation:blink 1.4s ease-in-out 2.5s infinite,fadeUp .5s ease 2.2s forwards;font-family:'Orbitron',monospace;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes blink{0%,100%{opacity:.25}50%{opacity:1}}

/* ── MAP ── */
#scMap{background:var(--bg);flex-direction:column;}
.map-top{padding:14px 16px 10px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;background:var(--bg2);}
.map-ttl{font-family:'Orbitron',monospace;font-size:.85rem;color:var(--gold);}
.map-sub{font-size:.68rem;color:var(--muted);margin-top:1px;}
.g-chip{font-family:'Orbitron',monospace;font-size:.78rem;color:var(--gold);background:rgba(255,214,0,.1);border:1px solid rgba(255,214,0,.3);padding:5px 12px;border-radius:20px;display:flex;align-items:center;gap:5px;}
.map-body{flex:1;overflow-y:auto;padding:12px 14px;}
.map-body::-webkit-scrollbar{width:3px;}
.map-body::-webkit-scrollbar-thumb{background:var(--bdr2);}
.act-blk{margin-bottom:16px;}
.act-lbl{font-family:'Orbitron',monospace;font-size:.62rem;letter-spacing:.22em;color:var(--muted);text-transform:uppercase;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--bdr);}
.act-lbl span{color:var(--gold);}
.chnd{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:8px;margin-bottom:6px;border:1px solid var(--bdr);background:var(--bg3);cursor:pointer;transition:all .2s;position:relative;}
.chnd::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--nc,var(--bdr2));}
.chnd:hover:not(.lk){background:var(--bg4);border-color:var(--nc,var(--bdr2));transform:translateX(4px);}
.chnd:active:not(.lk){transform:scale(.98);}
.chnd.lk{opacity:.28;cursor:not-allowed;}
.chnd.dn{opacity:.55;}
.chnd.bo::before{background:var(--red);}
.nd-ico{font-size:1.7rem;width:38px;text-align:center;}
.nd-inf{flex:1;}
.nd-ttl{font-size:.85rem;font-weight:700;color:var(--white);}
.nd-dsc{font-size:.68rem;color:var(--muted);margin-top:2px;}
.ndbadge{font-size:.62rem;font-family:'Orbitron',monospace;padding:3px 9px;border-radius:10px;white-space:nowrap;}
.nb-boss{background:rgba(229,57,53,.2);color:var(--red2);border:1px solid rgba(229,57,53,.4);}
.nb-done{background:rgba(29,185,84,.18);color:var(--green2);border:1px solid rgba(29,185,84,.3);}
.nb-lock{background:rgba(0,0,0,.3);color:var(--muted);}
.nb-go{background:rgba(255,214,0,.12);color:var(--gold);border:1px solid rgba(255,214,0,.32);animation:nbPulse 2s ease-in-out infinite;}
@keyframes nbPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,214,0,.3)}50%{box-shadow:0 0 0 6px rgba(255,214,0,0)}}
.map-foot{padding:12px 14px;border-top:1px solid var(--bdr);background:var(--bg2);}

/* ═══════════════════════════════════════
   BATTLE SCREEN — fiel à imagem
═══════════════════════════════════════ */
#scBattle{background:var(--bg);flex-direction:column;}

/* Top bar — igual à imagem: ← FUGIR | ⚡ Auto | 🔗 0 */
.bt-topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;
  background:var(--bg);
  border-bottom:1px solid rgba(255,255,255,.04);
}
.bt-flee{
  font-family:'Orbitron',monospace;font-size:.68rem;font-weight:700;
  background:var(--bg3);border:1px solid var(--bdr2);color:rgba(240,240,255,.85);
  padding:6px 14px;border-radius:6px;cursor:pointer;
  display:flex;align-items:center;gap:5px;letter-spacing:.05em;
  transition:all .15s;
}
.bt-flee:hover{border-color:var(--red);color:var(--red);}
.bt-chips{display:flex;gap:8px;align-items:center;}
.bt-chip{
  font-family:'Orbitron',monospace;font-size:.65rem;font-weight:700;
  padding:5px 12px;border-radius:5px;display:flex;align-items:center;gap:5px;
  cursor:pointer;transition:all .2s;letter-spacing:.05em;
}
.chip-auto{background:rgba(30,30,60,.8);border:1px solid rgba(100,100,200,.4);color:rgba(180,180,255,.9);}
.chip-auto.on{background:rgba(92,107,192,.3);border-color:rgba(144,164,248,.8);color:#fff;}
.chip-gold{background:rgba(20,20,10,.6);border:1px solid rgba(255,214,0,.35);color:var(--gold);}

/* Arena — caixa com borda vermelha sutil, fundo escuro, igual à imagem */
.bt-arena{
  margin:10px 14px 0;
  background:linear-gradient(180deg,#0a0a0f 0%,#0f0f1a 100%);
  border:1px solid rgba(180,30,30,.6);
  border-radius:10px;
  padding:14px 14px 10px;
  position:relative;overflow:hidden;
  box-shadow:0 0 30px rgba(180,20,20,.15) inset, 0 2px 20px rgba(0,0,0,.8);
}
/* brilho inferior vermelho sutil */
.bt-arena::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,rgba(200,40,40,.7),transparent);}

/* linha de piso */
.arena-floor{position:absolute;bottom:0;left:0;right:0;height:32px;background:linear-gradient(180deg,transparent,rgba(60,40,120,.1));border-top:1px solid rgba(80,50,160,.12);}
/* brilho central */
.arena-glow{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);width:220px;height:70px;border-radius:50%;background:radial-gradient(ellipse,rgba(90,60,180,.18) 0%,transparent 70%);pointer-events:none;}

/* BARRAS HP — lado a lado com "VS CAOS" no centro, igual à imagem */
.hp-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:12px;position:relative;z-index:2;}
.cb{flex:1;min-width:0;}
.cb-name{
  font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.82rem;
  color:var(--white);display:flex;align-items:center;justify-content:space-between;
  margin-bottom:5px;white-space:nowrap;overflow:hidden;
}
/* hero name azul brilhante como na imagem */
.cb-name.hero-nm{color:#60a0ff;text-shadow:0 0 8px rgba(96,160,255,.6);}
.cb-name.enemy-nm{color:#ff6060;text-shadow:0 0 8px rgba(255,96,96,.5);}
.cb-lv{font-family:'Orbitron',monospace;font-size:.58rem;color:var(--muted);flex-shrink:0;margin-left:4px;}
.hpbar{height:8px;background:rgba(0,0,0,.7);border-radius:4px;overflow:hidden;border:1px solid rgba(255,255,255,.05);}
.hpfill{height:100%;border-radius:4px;transition:width .55s cubic-bezier(.25,.8,.25,1);position:relative;}
.hpfill::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:rgba(255,255,255,.22);border-radius:4px;}
/* verde brilhante para hero, vermelho para enemy — igual à imagem */
.hpfill.hero{background:linear-gradient(90deg,#1a6b2a,#1db954,#57f58a);box-shadow:0 0 6px rgba(29,185,84,.5);}
.hpfill.enemy{background:linear-gradient(90deg,#8b0000,#c62828,#ff5252);box-shadow:0 0 6px rgba(198,40,40,.5);}
.hpfill.low{background:linear-gradient(90deg,#bf360c,#ff7043)!important;animation:lpulse .7s ease-in-out infinite;box-shadow:0 0 8px rgba(255,112,67,.6)!important;}
@keyframes lpulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.35)}}
.cb-nums{font-size:.66rem;color:var(--muted);margin-top:3px;display:flex;justify-content:space-between;align-items:center;}

/* VS badge central — "VS" em vermelho, "CAOS" embaixo, igual à imagem */
.vs-mid{display:flex;flex-direction:column;align-items:center;gap:1px;flex-shrink:0;padding-top:4px;}
.vs-badge{
  font-family:'Orbitron',monospace;font-size:.62rem;font-weight:900;
  color:#fff;background:var(--caos);
  padding:3px 6px;border-radius:4px;
  box-shadow:0 0 12px rgba(255,23,68,.7);
  letter-spacing:.05em;
}
.vs-sub{font-size:.44rem;letter-spacing:.25em;color:rgba(255,100,100,.8);font-family:'Orbitron',monospace;text-transform:uppercase;}

/* STATUS pills */
.st-row{display:flex;gap:3px;margin-top:2px;flex-wrap:wrap;}
.spill{font-size:.48rem;padding:1px 5px;border-radius:3px;font-weight:700;letter-spacing:.04em;}
.spill.burn{background:rgba(255,87,34,.3);color:#ff8a65;}
.spill.ice{background:rgba(33,150,243,.3);color:#90caf9;}
.spill.poison{background:rgba(156,39,176,.3);color:#ce93d8;}
.spill.shield{background:rgba(29,185,84,.3);color:#69f0ae;}
.spill.stun{background:rgba(255,214,0,.3);color:var(--gold2);}
.spill.berserk{background:rgba(229,57,53,.3);color:var(--red2);}

/* SPRITE ZONE — sprites grandes no centro da arena, igual à imagem */
.sp-zone{
  display:flex;align-items:flex-end;justify-content:space-around;
  height:130px;position:relative;z-index:2;
  padding:0 10px;
}
.sp-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;}
.sp-char{
  font-size:4.2rem;line-height:1;
  filter:drop-shadow(0 8px 16px rgba(0,0,0,.9));
  transition:transform .25s;
  user-select:none;cursor:default;
}
/* silhuetas brilhantes como na imagem */
.sp-char.hero-sp{filter:drop-shadow(0 0 8px rgba(96,160,255,.5)) drop-shadow(0 8px 12px rgba(0,0,0,.9));}
.sp-char.enemy-sp{filter:drop-shadow(0 0 8px rgba(255,80,80,.5)) drop-shadow(0 8px 12px rgba(0,0,0,.9));}
.sp-shadow{width:55px;height:9px;background:radial-gradient(ellipse,rgba(0,0,0,.6),transparent);margin-top:2px;}

/* FLOAT DAMAGE NUMBERS — vermelho néon grande como na imagem */
.fn{
  position:fixed;pointer-events:none;z-index:9999;
  font-family:'Orbitron',monospace;font-weight:900;
  animation:fnUp 1.2s ease-out forwards;
  text-shadow:0 2px 10px rgba(0,0,0,1),0 0 20px currentColor;
}
@keyframes fnUp{0%{opacity:1;transform:translateY(0) scale(.7)}15%{transform:translateY(-8px) scale(1.15)}100%{opacity:0;transform:translateY(-75px) scale(.7)}}
.fn-phys{color:#ff4444;font-size:2rem;}
.fn-magic{color:#d070ff;font-size:1.8rem;}
.fn-heal{color:#40ff80;font-size:1.6rem;}
.fn-miss{color:#666;font-size:1.1rem;}
.fn-drain{color:#ff8844;font-size:1.5rem;}
.fn-crit{color:#ffee00;font-size:2.4rem;}

/* MP BAR dentro da arena */
.mp-row{margin:8px 0 0;}
.mp-lbl{font-size:.62rem;color:var(--muted);font-weight:600;margin-bottom:3px;display:flex;justify-content:space-between;}
.mpbar{height:5px;background:rgba(0,0,0,.6);border-radius:3px;overflow:hidden;border:1px solid rgba(255,255,255,.04);}
.mpfill{height:100%;border-radius:3px;background:linear-gradient(90deg,#1a237e,#5c6bc0,#90caf9);transition:width .4s ease;box-shadow:0 0 5px rgba(92,107,192,.5);}

/* EXP BAR — abaixo da arena, fundo escuro, label + valor à direita */
.exp-row{
  margin:8px 14px 0;
  background:var(--bg2);border:1px solid var(--bdr);border-radius:7px;
  padding:7px 12px;
}
.exp-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.exp-lbl{font-family:'Orbitron',monospace;font-size:.6rem;color:var(--muted);letter-spacing:.18em;}
.exp-val{font-family:'Orbitron',monospace;font-size:.65rem;color:var(--gold);}
.expbar{height:5px;background:rgba(0,0,0,.7);border-radius:3px;overflow:hidden;}
.expfill{height:100%;background:linear-gradient(90deg,#f57f17,#ffd600);border-radius:3px;transition:width .5s ease;box-shadow:0 0 5px rgba(255,214,0,.5);}

/* BATTLE LOG — compacto */
.blog{
  flex:1;margin:8px 14px 0;overflow-y:auto;
  padding:6px 10px;background:var(--bg2);
  border:1px solid var(--bdr);border-radius:7px;
  display:flex;flex-direction:column;gap:2px;
  font-size:.7rem;min-height:0;
}
.blog::-webkit-scrollbar{width:3px;}
.blog::-webkit-scrollbar-thumb{background:var(--bdr2);}
.ll{line-height:1.55;animation:llIn .18s ease;padding:1px 0;}
@keyframes llIn{from{opacity:0;transform:translateX(-4px)}to{opacity:1;transform:none}}
.ll.hero{color:#80b4ff;}
.ll.enemy{color:#ff9090;}
.ll.system{color:var(--gold2);font-style:italic;}
.ll.item{color:var(--green2);}

/* ═══════════════════════════════════════
   ACTION BUTTONS — 2x2, grandes, coloridos
   IGUAL à imagem: ATACAR(vermelho), MAGIA(roxo), DEFENDER(azul), CURAR(verde)
═══════════════════════════════════════ */
.act-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:8px;padding:10px 14px 14px;
  background:var(--bg);
  flex-shrink:0;
}
.abt{
  padding:0;height:72px;
  border:none;border-radius:10px;cursor:pointer;
  font-family:'Orbitron',monospace;font-size:.75rem;font-weight:700;letter-spacing:.06em;
  color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
  transition:transform .12s,filter .12s,box-shadow .12s;
  position:relative;overflow:hidden;
}
/* brilho superior */
.abt::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:rgba(255,255,255,.2);}
/* overlay hover */
.abt::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.08);opacity:0;transition:opacity .12s;}
.abt:hover::after{opacity:1;}
.abt:hover{transform:translateY(-2px);}
.abt:active{transform:scale(.94);filter:brightness(.85);}
.abt:disabled{opacity:.3;cursor:not-allowed;transform:none;filter:none;}
.abt .bico{font-size:1.5rem;line-height:1;}
/* cores exatas como na imagem */
.abt.atk{
  background:linear-gradient(175deg,#c62828,#e53935,#c62828);
  box-shadow:0 4px 20px rgba(229,57,53,.5),0 1px 0 rgba(255,100,100,.3) inset;
}
.abt.mag{
  background:linear-gradient(175deg,#6a1b9a,#9c27b0,#6a1b9a);
  box-shadow:0 4px 20px rgba(156,39,176,.5),0 1px 0 rgba(220,120,255,.3) inset;
}
.abt.def{
  background:linear-gradient(175deg,#0d47a1,#1565c0,#0d47a1);
  box-shadow:0 4px 20px rgba(21,101,192,.5),0 1px 0 rgba(100,160,255,.3) inset;
}
.abt.cur{
  background:linear-gradient(175deg,#1b5e20,#2e7d32,#1b5e20);
  box-shadow:0 4px 20px rgba(46,125,50,.5),0 1px 0 rgba(100,220,120,.3) inset;
}
.pot-c{
  position:absolute;top:6px;right:8px;
  font-size:.58rem;background:rgba(0,0,0,.55);
  border:1px solid rgba(255,255,255,.18);
  border-radius:10px;padding:1px 6px;
  font-family:'Rajdhani',sans-serif;font-weight:700;
}

/* ── SKILL MENU (slide up) ── */
#sk-menu{
  position:absolute;bottom:0;left:0;right:0;z-index:20;
  background:var(--bg2);border-top:2px solid var(--bdr2);
  padding:10px 14px 14px;
  transform:translateY(102%);
  transition:transform .3s cubic-bezier(.25,.8,.25,1);
}
#sk-menu.open{transform:translateY(0);}
.skm-hdr{font-family:'Orbitron',monospace;font-size:.65rem;color:var(--muted);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
.skm-x{cursor:pointer;background:var(--bg3);border:1px solid var(--bdr2);color:var(--white);font-size:.62rem;padding:3px 9px;border-radius:4px;font-family:'Orbitron',monospace;}
.sk-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.skb{background:var(--bg3);border:1px solid var(--bdr2);border-radius:7px;padding:10px;cursor:pointer;display:flex;flex-direction:column;gap:3px;transition:all .18s;text-align:left;color:var(--white);}
.skb:hover:not(:disabled){background:var(--bg4);border-color:var(--purple2);transform:translateY(-2px);}
.skb:disabled{opacity:.28;cursor:not-allowed;}
.skb-top{display:flex;align-items:center;gap:7px;}
.skb-nm{font-family:'Orbitron',monospace;font-size:.6rem;font-weight:700;color:var(--purple2);}
.skb-ds{font-size:.64rem;color:var(--muted);line-height:1.3;}
.skb-mp{font-size:.6rem;font-family:'Orbitron',monospace;color:#90caf9;}

/* ── RESULT OVERLAY ── */
#res-ov{position:absolute;inset:0;z-index:100;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px;}
#res-ov.show{display:flex;}
#res-ov.victory{background:radial-gradient(ellipse at 50% 40%,rgba(0,80,20,.35),rgba(0,0,0,.94));}
#res-ov.defeat{background:radial-gradient(ellipse at 50% 40%,rgba(100,0,20,.35),rgba(0,0,0,.96));}
.res-ico{font-size:4.5rem;animation:resP .55s cubic-bezier(.175,.885,.32,1.275);}
@keyframes resP{from{transform:scale(0) rotate(-18deg)}to{transform:scale(1)}}
.res-ttl{font-family:'Orbitron',monospace;font-size:2rem;font-weight:900;text-align:center;}
.res-ttl.v{color:var(--gold);filter:drop-shadow(0 0 22px rgba(255,214,0,.6));}
.res-ttl.d{color:var(--red2);filter:drop-shadow(0 0 22px rgba(229,57,53,.6));}
.res-rws{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.rpill{background:rgba(255,255,255,.06);border:1px solid var(--bdr2);border-radius:20px;padding:6px 14px;font-family:'Orbitron',monospace;font-size:.68rem;animation:rppA .4s cubic-bezier(.175,.885,.32,1.275) backwards;}
@keyframes rppA{from{transform:scale(.35);opacity:0}to{transform:scale(1);opacity:1}}
.res-btn{padding:14px 42px;border:none;border-radius:8px;cursor:pointer;font-family:'Orbitron',monospace;font-size:.8rem;font-weight:700;letter-spacing:.12em;background:linear-gradient(135deg,#1b5e20,#388e3c);color:#fff;box-shadow:0 4px 22px rgba(56,142,60,.5);transition:all .2s;}
.res-btn:hover{transform:translateY(-3px);box-shadow:0 7px 28px rgba(56,142,60,.6);}

/* ── ITEMS ── */
#scItems{background:var(--bg);flex-direction:column;}
.itabs{display:flex;}
.itab{font-family:'Orbitron',monospace;font-size:.62rem;padding:6px 15px;background:none;border:1px solid var(--bdr);color:var(--muted);cursor:pointer;transition:all .15s;}
.itab:first-child{border-radius:4px 0 0 4px;}
.itab:last-child{border-radius:0 4px 4px 0;border-left:none;}
.itab.active{background:var(--bg4);color:var(--gold);border-color:rgba(255,214,0,.5);}
.ibody{flex:1;overflow-y:auto;padding:12px 14px;}
.ibody::-webkit-scrollbar{width:3px;}
.ibody::-webkit-scrollbar-thumb{background:var(--bdr2);}
.irow{display:flex;align-items:center;gap:10px;background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;padding:12px;cursor:pointer;transition:all .2s;margin-bottom:6px;}
.irow:hover{background:var(--bg4);border-color:var(--teal2);transform:translateX(3px);}
.iem{font-size:2rem;width:38px;text-align:center;}
.iinf{flex:1;}
.inm{font-size:.85rem;font-weight:700;color:var(--white);}
.ieff{font-size:.7rem;color:var(--teal2);margin-top:2px;}
.iqty{font-family:'Orbitron',monospace;font-size:.7rem;background:rgba(255,255,255,.06);border:1px solid var(--bdr2);padding:3px 9px;border-radius:4px;}
.spr{font-family:'Orbitron',monospace;font-size:.72rem;color:var(--gold);white-space:nowrap;}
.ssec{margin-bottom:14px;}
.ssec-h{font-family:'Orbitron',monospace;font-size:.6rem;letter-spacing:.22em;color:var(--muted);text-transform:uppercase;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--bdr);}

/* ── BATTLE PASS ── */
#scBP{background:var(--bg);flex-direction:column;}
.bp-hdr{padding:14px 16px;border-bottom:1px solid var(--bdr);background:linear-gradient(135deg,rgba(74,20,140,.35),var(--bg2));}
.bp-ttl{font-family:'Orbitron',monospace;font-size:.95rem;font-weight:900;color:var(--purple2);}
.bp-sub{font-size:.72rem;color:var(--muted);margin-top:2px;font-style:italic;font-family:'Crimson Pro',serif;}
.bp-xr{margin-top:10px;}
.bp-xlb{display:flex;justify-content:space-between;font-family:'Orbitron',monospace;font-size:.6rem;color:var(--muted);margin-bottom:4px;}
.bp-xv{color:var(--purple2);}
.bp-pw{height:8px;background:rgba(0,0,0,.6);border-radius:4px;overflow:hidden;border:1px solid rgba(255,255,255,.04);}
.bp-pf{height:100%;background:linear-gradient(90deg,var(--purple),#ba68c8);border-radius:4px;transition:width .5s;}
.bp-list{flex:1;overflow-y:auto;padding:12px 14px;}
.bp-list::-webkit-scrollbar{width:3px;}
.bp-list::-webkit-scrollbar-thumb{background:var(--bdr2);}
.bp-tier{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:8px;margin-bottom:6px;border:1px solid var(--bdr);background:var(--bg3);transition:all .2s;}
.bp-tier.cl{opacity:.5;}
.bp-tier.av{border-color:var(--purple);cursor:pointer;background:rgba(123,31,162,.12);}
.bp-tier.av:hover{transform:translateX(4px);box-shadow:0 0 16px rgba(123,31,162,.3);}
.bp-tier.lk{opacity:.22;}
.bp-lv{font-family:'Orbitron',monospace;font-size:.62rem;color:var(--muted);width:30px;flex-shrink:0;}
.bp-ic{font-size:1.6rem;}
.bp-inf{flex:1;}
.bp-nm{font-size:.82rem;font-weight:700;color:var(--white);}
.bp-tp{font-size:.64rem;color:var(--muted);margin-top:1px;}
.bp-st{font-size:1.1rem;}

/* ── TOAST ── */
#toast{position:absolute;bottom:76px;left:50%;transform:translateX(-50%) translateY(18px);background:var(--bg4);border:1px solid var(--bdr2);border-radius:7px;padding:8px 18px;font-size:.73rem;font-family:'Orbitron',monospace;opacity:0;pointer-events:none;z-index:300;white-space:nowrap;transition:all .28s;letter-spacing:.05em;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── SHARED ── */
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-9px)}75%{transform:translateX(9px)}}
</style>
</head>
<body>

</div>

</div>

const ri  = (a,b) => Math.floor(Math.random()*(b-a+1))+a;
const clamp = (v,lo,hi) => Math.max(lo,Math.min(hi,v));
const sleep = ms => new Promise(r=>setTimeout(r,ms));

function nav(id) {
  document.querySelectorAll('.screen').forEach(s=>{ s.classList.remove('active'); s.style.display=''; });
  const s = document.getElementById(id);
  s.classList.add('active'); s.style.display='flex';
}

function toast(msg, ms=2200) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(()=>t.classList.remove('show'), ms);
}

function log(msg, type='system') {
  const el = document.getElementById('bLog');
  const p = document.createElement('div'); p.className=`ll ${type}`; p.textContent=msg;
  el.appendChild(p); el.scrollTop = el.scrollHeight;
  // keep log short
  while(el.children.length > 60) el.removeChild(el.firstChild);
}

// Float damage numbers — posicionados sobre o sprite correto
function floatN(val, type, side='enemy') {
  const zone = document.getElementById('spZone');
  const rect = zone.getBoundingClientRect();
  const el = document.createElement('div');
  el.className = `fn fn-${type}`;
  el.textContent = type==='miss'?'MISS':type==='heal'?`+${val}`:val;
  const x = side==='hero' ? rect.left + 50 : rect.right - 110;
  const y = rect.top + 10;
  el.style.cssText = `left:${x}px;top:${y}px;`;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 1300);
}

function updUI() {

  document.getElementById('hHpNum').textContent   = `${h.hp}/${h.hpMax}`;
  document.getElementById('hMpFill').style.width  = clamp(h.mp/h.mpMax*100,0,100)+'%';
  document.getElementById('hMpNum').textContent   = `${h.mp}/${h.mpMax}`;

  document.getElementById('expFill').style.width  = clamp(h.exp/h.expNext*100,0,100)+'%';
  document.getElementById('expVal').textContent   = `${h.exp} / ${h.expNext}`;
  // Gold
  ['bGold','mGold','iGold'].forEach(id=>{ const el=document.getElementById(id); if(el) el.textContent=h.gold; });
  // Potions
  const pots=(h.inventory.hpPotion||0)+(h.inventory.mpPotion||0)+(h.inventory.elixir||0);
  document.getElementById('potCnt').textContent = pots;
  document.getElementById('bHeal').disabled = pots===0;

  if(e){
    document.getElementById('eName').textContent  = e.name;

    ebar.style.width=epPct+'%'; ebar.className='hpfill enemy'+(epPct<25?' low':'');

  }
  renderSts();
}

function renderSts() {
  const hs=document.getElementById('hSts'), es=document.getElementById('eSts');
  hs.innerHTML=''; es.innerHTML='';
  (G.hero.statuses||[]).forEach(s=>hs.innerHTML+=`<span class="spill ${s}">${s.toUpperCase()}</span>`);
  if(G.hero.buffs.shield)  hs.innerHTML+=`<span class="spill shield">SHIELD</span>`;
  if(G.hero.buffs.berserk) hs.innerHTML+=`<span class="spill berserk">BERSERK</span>`;

}

// ══════════════════════════════════════
function doAct(t) { if(!G.battle||G.turn!=='player')return; closeSK(); if(t==='attack')pAtk(); else if(t==='defend')pDef(); else if(t==='item')pItem(); }

function pAtk() {
  const h=G.hero, e=G.enemy;
  const atk = h.atk+(h.buffs.berserk?Math.floor(h.atk*.5):0);
  const dmg = Math.max(1, atk - Math.floor(e.def*.4) + ri(-3,3));
  e.hp = clamp(e.hp-dmg, 0, e.hpMax);
  floatN(dmg,'phys');
  animSp('hero'); setTimeout(()=>animSp('enemy','shake'),220);
  log(`${h.name} atacou ${e.name} — ${dmg} dano!`, 'hero');
  updUI(); checkW(); if(G.battle) endPT();
}

function pDef() {
  G.hero.buffs.shield=true;
  log(`${G.hero.name} assumiu posição defensiva!`, 'hero');
  updUI(); endPT();
}

function pItem() {
  const h=G.hero;
  const prio=[
    ['hpPotion', k=>(h.inventory[k]||0)>0 && h.hp<h.hpMax*.6],
    ['elixir',   k=>(h.inventory[k]||0)>0],
    ['mpPotion', k=>(h.inventory[k]||0)>0 && h.mp<h.mpMax*.4],
    ['bomb',     k=>(h.inventory[k]||0)>0],
    ['antidote', k=>(h.inventory[k]||0)>0 && h.statuses.includes('poison')],
    ['hpPotion', k=>(h.inventory[k]||0)>0],
    ['mpPotion', k=>(h.inventory[k]||0)>0],
  ];
  const best=prio.find(([k,f])=>f(k));
  if(!best){toast('Sem itens disponíveis!');return;}
  useItem(best[0]);
}

function useItem(key, fromInv=true) {
  const it=ITEMS[key], h=G.hero;
  if(fromInv && (!h.inventory[key]||h.inventory[key]<=0)){toast('Sem esse item!');return;}
  if(fromInv) h.inventory[key]--;
  switch(it.eff){
    case 'hp':    h.hp=clamp(h.hp+it.val,0,h.hpMax); floatN(it.val,'heal','hero'); log(`Usou ${it.name}: +${it.val} HP 💚`,'item'); break;
    case 'mp':    h.mp=clamp(h.mp+it.val,0,h.mpMax); log(`Usou ${it.name}: +${it.val} MP 🔵`,'item'); break;
    case 'full':  h.hp=clamp(h.hp+60,0,h.hpMax); h.mp=clamp(h.mp+40,0,h.mpMax); floatN(60,'heal','hero'); log(`Elixir: +60 HP +40 MP ✨`,'item'); break;
    case 'cure':  h.statuses=h.statuses.filter(s=>s!=='poison'); log('Veneno curado! 💊','item'); break;
    case 'bomb':  {const bd=Math.max(1,it.val+ri(-5,5)-Math.floor(G.enemy.def*.2)); G.enemy.hp=clamp(G.enemy.hp-bd,0,G.enemy.hpMax); floatN(bd,'phys'); log(`💣 Bomba: ${bd} dano!`,'item'); updUI(); checkW(); if(!G.battle)return; break;}
    case 'atk':   h.atk+=it.val; log(`${it.name}: +${it.val} ATK!`,'item'); break;
    case 'def':   h.def+=it.val; log(`${it.name}: +${it.val} DEF!`,'item'); break;
    case 'mpmax': h.mpMax+=it.val; h.mp=Math.min(h.mp+it.val,h.mpMax); log(`${it.name}: +${it.val} MP máx!`,'item'); break;
  }
  updUI();
  if(fromInv && G.battle && it.combat) endPT();
}

function openSK() {
  if(!G.battle||G.turn!=='player') return;
  const g=document.getElementById('skGrid'); g.innerHTML='';
  G.hero.skills.forEach(sk=>{
    const s=SKILLS[sk];
    const b=document.createElement('button'); b.className='skb'; b.disabled=G.hero.mp<s.mp;
    b.innerHTML=`<div class="skb-top"><span>${s.icon}</span><span class="skb-nm">${s.name}</span></div><div class="skb-ds">${s.desc}</div><div class="skb-mp">MP: ${s.mp}</div>`;
    b.onclick=()=>{closeSK(); useSK(sk);};
    g.appendChild(b);
  });
  document.getElementById('sk-menu').classList.add('open');
}
function closeSK() { document.getElementById('sk-menu').classList.remove('open'); }

function useSK(sk) {
  const s=SKILLS[sk], h=G.hero;
  if(h.mp<s.mp){toast('MP insuficiente!');return;}
  h.mp=Math.max(0,h.mp-s.mp);
  if(s.tgt==='self'||s.type==='buff') {
    if(s.eff==='shield') { h.buffs.shield=true; log(`${s.name}: Escudo ativado!`,'hero'); }
    if(s.eff==='berserk'){ h.buffs.berserk=true; h.buffs.berserkT=2; log(`${s.name}: BERSERK! ATK+50%!`,'hero'); }
    if(s.eff==='evade')  { h.buffs.evade=true; log(`${s.name}: Evasão ativa!`,'hero'); }
  } else {
    const atk=h.atk+(h.buffs.berserk?Math.floor(h.atk*.5):0);
    let dmg=s.pierce?Math.max(1,Math.floor(atk*s.pow)+ri(-2,2)):Math.max(1,Math.floor(atk*s.pow)-Math.floor(G.enemy.def*.35)+ri(-3,3));
    G.enemy.hp=clamp(G.enemy.hp-dmg,0,G.enemy.hpMax);
    floatN(dmg,s.type==='magic'?'magic':'phys');
    animSp('hero'); setTimeout(()=>animSp('enemy','shake'),220);
    log(`${s.name} — ${dmg} dano a ${G.enemy.name}!`,'hero');
    if(s.eff && ['burn','ice','poison','stun'].includes(s.eff) && Math.random()>.35){
      if(!G.enemy.statuses.includes(s.eff)) G.enemy.statuses.push(s.eff);
      log(`${G.enemy.name} sofreu: ${s.eff.toUpperCase()}!`,'system');
    }
    checkW();
  }
  updUI(); if(G.battle) endPT();
}

// ══════════════════════════════════════
//  ENEMY TURN
// ══════════════════════════════════════
function setBD(v) {
  ['bAtk','bMag','bDef'].forEach(id=>{ const b=document.getElementById(id); if(b) b.disabled=v; });
  if(!v) { const pots=(G.hero.inventory.hpPotion||0)+(G.hero.inventory.mpPotion||0)+(G.hero.inventory.elixir||0); document.getElementById('bHeal').disabled=pots===0; }
  else document.getElementById('bHeal').disabled=true;
}

async function endPT() {
  if(!G.battle) return;
  G.turn='enemy'; setBD(true);
  await sleep(750); await enemyTurn();
}

async function enemyTurn() {
  if(!G.battle) return;
  const h=G.hero, e=G.enemy;
  // Tick enemy statuses
  if(e.statuses.includes('burn'))  { e.hp=Math.max(0,e.hp-8); log(`🔥 ${e.name} queima: -8 HP`,'system'); updUI(); await sleep(300); }
  if(e.statuses.includes('poison')){ e.hp=Math.max(0,e.hp-5); log(`☠️  ${e.name} envenena: -5 HP`,'system'); updUI(); await sleep(300); }
  if(e.hp<=0){ endBattle('victory'); return; }
  // Frozen / stun
  if(e.statuses.includes('ice'))  { e.statuses=e.statuses.filter(x=>x!=='ice');   log(`${e.name} descongelou.`,'system'); G.turn='player'; setBD(false); updUI(); return; }
  if(e.statuses.includes('stun')) { e.statuses=e.statuses.filter(x=>x!=='stun'); log(`${e.name} atordoado — perde o turno!`,'system'); G.turn='player'; setBD(false); updUI(); return; }
  await sleep(400);
  // Pick and execute skill
  const skN = e.sks[ri(0,e.sks.length-1)];
  const fn = ESK[skN]; if(fn) fn(e,h);
  updUI(); await sleep(350);
  // Tick hero poison
  if(h.statuses.includes('poison')){ h.hp=clamp(h.hp-4,0,h.hpMax); log(`☠️  Você envenena: -4 HP`,'enemy'); floatN(4,'drain','hero'); updUI(); }
  // Decay
  if(e.statuses.includes('burn')&&Math.random()<.28) e.statuses=e.statuses.filter(x=>x!=='burn');
  if(h.buffs.berserkT>0){ h.buffs.berserkT--; if(!h.buffs.berserkT){ h.buffs.berserk=false; log('Berserk expirou.','system'); } }
  h.buffs.evade=false;
  if(h.hp<=0){ endBattle('defeat'); return; }
  G.turn='player'; setBD(false); updUI();
  log('— Seu turno —','system');
  if(G.auto){ await sleep(650); autoPlay(); }
}

function dh(dmg, prefix) {
  const h=G.hero;
  if(h.buffs.evade&&Math.random()<.48){ floatN(0,'miss','hero'); log(`${prefix} — MISS!`,'system'); return; }
  if(h.buffs.shield){ dmg=Math.floor(dmg*.5); h.buffs.shield=false; log('Escudo bloqueou metade!','system'); }
  h.hp=clamp(h.hp-dmg,0,h.hpMax);
  floatN(dmg,'phys','hero');
  animSp('enemy'); setTimeout(()=>animSp('hero','shake'),220);
  log(`${prefix} ${dmg}!`,'enemy');
}
function addHSt(s){ if(!G.hero.statuses.includes(s)) G.hero.statuses.push(s); }

// ══════════════════════════════════════
//  AUTO MODE
// ══════════════════════════════════════
function toggleAuto() {
  G.auto=!G.auto;
  document.getElementById('autoChip').classList.toggle('on',G.auto);
  if(G.auto&&G.battle&&G.turn==='player') autoPlay();
}
function autoPlay() {
  if(!G.battle||G.turn!=='player'||!G.auto) return;
  const h=G.hero;
  if(h.hp<h.hpMax*.35&&(h.inventory.hpPotion||0)>0){ doAct('item'); return; }
  const best=h.skills.find(sk=>SKILLS[sk].type!=='buff'&&h.mp>=SKILLS[sk].mp);
  if(best){ useSK(best); return; }
  pAtk();
}

// ══════════════════════════════════════
//  BATTLE END
// ══════════════════════════════════════
function checkW() { if(G.enemy&&G.enemy.hp<=0&&G.battle) endBattle('victory'); }

function endBattle(res) {
  G.battle=false; G.turn='none'; G.auto=false; clearTimeout(G.autoT); setBD(false);
  const ov=document.getElementById('res-ov'); ov.style.display='flex';
  if(res==='victory') {
    const e=G.enemy;
    G.hero.gold+=e.gold;
    G.bpXp+=Math.floor(e.exp/2);
    const lvled=addExp(e.exp);
    ACTS[G.curAct].chapters[G.curChap].completed=true;
    checkBpLv();
    ov.className='show victory';
    document.getElementById('resIco').textContent=e.boss?'🏆':'⭐';
    document.getElementById('resTtl').innerHTML=`<span class="v">${e.boss?'BOSS DERROTADO!':'VITÓRIA!'}</span>`;
    document.getElementById('resRws').innerHTML=`
      <div class="rpill" style="animation-delay:.1s">✨ +${e.exp} EXP</div>
      <div class="rpill" style="animation-delay:.2s">💰 +${e.gold}g</div>
      ${lvled?'<div class="rpill" style="animation-delay:.3s;border-color:var(--gold);color:var(--gold)">★ LEVEL UP!</div>':''}
      <div class="rpill" style="animation-delay:.4s;border-color:var(--purple2);color:var(--purple2)">🌟 +${Math.floor(e.exp/2)} BP XP</div>`;
    document.getElementById('resBtn').textContent='Continuar →';
    document.getElementById('resBtn').onclick=()=>{ ov.style.display='none'; advChap(); };
  } else {
    ov.className='show defeat';
    document.getElementById('resIco').textContent='💀';
    document.getElementById('resTtl').innerHTML='<span class="d">DERROTA</span>';
    document.getElementById('resRws').innerHTML=`<div class="rpill" style="color:var(--muted)">Os Erros te consumiram...</div>`;
    document.getElementById('resBtn').textContent='↺ Tentar Novamente';
    G.hero.hp=Math.floor(G.hero.hpMax*.5);
    G.hero.mp=Math.floor(G.hero.mpMax*.5);
    document.getElementById('resBtn').onclick=()=>{ ov.style.display='none'; startBattle(G.curAct,G.curChap); };
  }
}

function addExp(amt) {
  const h=G.hero; h.exp+=amt;
  if(h.exp>=h.expNext){
    h.exp-=h.expNext; h.level++; h.expNext=Math.floor(h.expNext*1.45);
    h.hpMax+=16; h.hp=h.hpMax; h.mpMax+=9; h.mp=h.mpMax; h.atk+=3; h.def+=2;
    log(`★ LEVEL UP! Nível ${h.level}! Stats aumentados!`,'system'); updUI(); return true;
  }
  updUI(); return false;
}

function advChap() {
  const act=ACTS[G.curAct];
  if(G.curChap+1<act.chapters.length){ G.curChap++; nav('scMap'); renderMap(); }
  else {
    const na=G.curAct+1;
    if(na<ACTS.length){ G.curAct=na; G.curChap=0; showStory(na); }
    else showCreds(true);
  }
}

function tryFlee() {
  if(!G.battle){ nav('scMap'); renderMap(); return; }
  if(Math.random()>.42){ G.battle=false; log('Você fugiu!','system'); setTimeout(()=>{ nav('scMap'); renderMap(); },400); }
  else { log('Fuga falhou! O inimigo bloqueia!','system'); endPT(); }
}

// ══════════════════════════════════════
//  SPRITE ANIMATIONS
// ══════════════════════════════════════
function animSp(who, type='attack') {
  const el=document.getElementById(who==='hero'?'hSp':'eSp');
  if(!el) return;
  if(type==='attack'){ el.style.transform='scale(1.35)'; setTimeout(()=>el.style.transform='',280); }
  if(type==='shake'){ el.style.animation='none'; el.offsetHeight; el.style.animation='shk .35s ease-in-out'; el.addEventListener('animationend',()=>el.style.animation='',{once:true}); }
}

// ══════════════════════════════════════
//  ITEMS SCREEN
// ══════════════════════════════════════
function renderI(tab) {
  document.getElementById('tInv').classList.toggle('active',tab==='inv');
  document.getElementById('tShop').classList.toggle('active',tab==='shop');
  document.getElementById('iGold').textContent=G.hero?.gold||0;
  const body=document.getElementById('iBody'); body.innerHTML='';
  if(tab==='inv'){
    const inv=G.hero?.inventory||{};
    const keys=Object.keys(inv).filter(k=>inv[k]>0);
    if(!keys.length){ body.innerHTML='<div style="color:var(--muted);text-align:center;padding:32px;font-size:.82rem">Inventário vazio...</div>'; nav('scItems'); return; }
    keys.forEach(k=>{
      const it=ITEMS[k]; if(!it)return;
      const r=document.createElement('div'); r.className='irow';
      r.innerHTML=`<div class="iem">${it.emoji}</div><div class="iinf"><div class="inm">${it.name}</div><div class="ieff">${it.desc}</div></div><div class="iqty">×${inv[k]}</div>`;
      r.onclick=()=>{ if(it.combat&&!G.battle){toast('Só pode usar em batalha!');}else{useItem(k);renderI('inv');} };
      body.appendChild(r);
    });
  } else {
    [['⚗ Poções & Itens',['hpPotion','mpPotion','elixir','antidote','bomb']],
     ['📚 Grimórios',     ['atkGrimoire','defGrimoire','mpGrimoire']],
     ['🛡 Equipamentos',  ['runicArmor']]].forEach(([ttl,keys])=>{
       const sec=document.createElement('div'); sec.className='ssec';
       sec.innerHTML=`<div class="ssec-h">${ttl}</div>`;
       keys.forEach(k=>{
         const it=ITEMS[k];
         const r=document.createElement('div'); r.className='irow';
         r.innerHTML=`<div class="iem">${it.emoji}</div><div class="iinf"><div class="inm">${it.name}</div><div class="ieff">${it.desc}</div></div><div class="spr">💰${it.cost}g</div>`;
         r.onclick=()=>buyItem(k);
         sec.appendChild(r);
       });
       body.appendChild(sec);
     });
  }
  nav('scItems');
}

function buyItem(k) {
  if(!G.hero){toast('Inicie uma jornada primeiro!');return;}
  const it=ITEMS[k];
  if(G.hero.gold<it.cost){toast(`Precisa de ${it.cost}g!`);return;}
  G.hero.gold-=it.cost;
  if(['atk','def','mpmax'].includes(it.eff)) useItem(k,false);
  else{ G.hero.inventory[k]=(G.hero.inventory[k]||0)+1; toast(`✅ Comprou ${it.name}!`); }
  renderI('shop');
}

// ══════════════════════════════════════
//  BATTLE PASS
// ══════════════════════════════════════
function checkBpLv(){ const n=Math.floor(G.bpXp/BP_XP); if(n>G.bpLv){ G.bpLv=n; toast(`🌟 Passe de Batalha: Nível ${G.bpLv}!`,2600); } }
function renderBP(){
  const pct=((G.bpXp%BP_XP)/BP_XP*100).toFixed(1);
  document.getElementById('bpLv').textContent=G.bpLv;
  document.getElementById('bpXp').textContent=G.bpXp;
  document.getElementById('bpPf').style.width=pct+'%';
  const list=document.getElementById('bpList'); list.innerHTML='';
  BP_REWARDS.forEach(r=>{
    const cl=G.bpClaimed.includes(r.lv);
    const av=G.bpLv>=r.lv&&!cl;
    const lk=G.bpLv<r.lv;
    const t=document.createElement('div');
    t.className='bp-tier'+(cl?' cl':av?' av':' lk');
    t.innerHTML=`<div class="bp-lv">Lv${r.lv}</div><div class="bp-ic">${r.icon}</div><div class="bp-inf"><div class="bp-nm">${r.name}</div><div class="bp-tp">${r.type}</div></div><div class="bp-st">${cl?'✅':av?'🎁':'🔒'}</div>`;
    if(av) t.onclick=()=>claimBP(r.lv);
    list.appendChild(t);
  });
  nav('scBP');
}
function claimBP(lv){
  if(!G.hero){toast('Inicie uma jornada!');return;}
  const r=BP_REWARDS.find(x=>x.lv===lv); G.bpClaimed.push(lv);
  if(r.type==='item'){G.hero.inventory[r.id]=(G.hero.inventory[r.id]||0)+r.qty; toast(`🎁 ${r.name} recebido!`);}
  else if(r.type==='gold'){G.hero.gold+=r.val; toast(`💰 +${r.val}g!`);}
  else if(r.type==='special'){G.hero.gold+=r.val; G.hero.inventory.runicArmor=(G.hero.inventory.runicArmor||0)+1; toast('⚡ Recompensa especial!');}
  else toast(`📜 Título: ${r.name}!`);
  renderBP();
}

    :`<div style="text-align:center"><div style="font-family:'Orbitron',monospace;color:var(--gold);font-size:1rem;margin-bottom:12px">CalcQuest 2</div><div style="font-size:.82rem;color:rgba(238,238,255,.72);line-height:2;font-family:'Crimson Pro',serif">A Saga dos Números<br>3 Atos · 11 Capítulos<br>3 Classes · 9 Inimigos únicos<br>Passe de Batalha Sazonal<br><br><span style="color:var(--purple2)">Feito com HTML, CSS & JS puro</span></div></div>`;

  ov.innerHTML=`<div style="background:#17171f;border:1px solid #35355a;border-radius:12px;padding:26px;max-width:340px;width:90%">${body}<button style="width:100%;margin-top:18px;padding:13px;border:none;border-radius:8px;background:var(--red);color:#fff;font-family:'Orbitron',monospace;font-size:.75rem;font-weight:700;cursor:pointer;letter-spacing:.1em">Fechar</button></div>`;

}
